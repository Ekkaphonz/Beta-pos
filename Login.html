<!DOCTYPE html>
<html lang="lo" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ເຂົ້າສູ່ລະບົບ · Bakery POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <span class="emoji-stack">🍞🥖🥟</span>
      <h1>Bakery POS</h1>
      <p>ລະບົບຂາຍສິນຄ້າໂຮງຮຽນ</p>
    </div>

    <div style="text-align:center;margin-bottom:22px;">
      <span class="auth-badge">👤 ພະນັກງານຂາຍ</span>
    </div>

    <div id="error-msg" class="auth-error"></div>

    <div class="form-group">
      <label>ຊື່ຜູ້ໃຊ້</label>
      <input type="text" id="username" placeholder="ກະລຸນາໃສ່ຊື່ຜູ້ໃຊ້" autocomplete="username">
    </div>

    <div class="form-group">
      <label>ລະຫັດຜ່ານ</label>
      <input type="password" id="password" placeholder="ກະລຸນາໃສ່ລະຫັດຜ່ານ" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem;" onclick="doLogin()">
      🔑 ເຂົ້າສູ່ລະບົບ
    </button>

    <div class="auth-link" style="margin-top:20px;">
      <a href="admin-login.html">🔐 ເຂົ້າໃຊ້ Admin →</a>
    </div>

    <div class="demo-hint">
      <strong>Demo:</strong><br>
      ຜູ້ໃຊ້: <code>cashier</code> &nbsp;|&nbsp; ລະຫັດ: <code>pos1234</code>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/sounds.js"></script>
  <script>
    // Restore theme
    const t = localStorage.getItem('pos_theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);

    if (AUTH.isUserLoggedIn()) window.location.href = 'index.html';

    function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const err = document.getElementById('error-msg');
      if (!u || !p) {
        err.style.display='block';
        err.textContent='❌ ກະລຸນາໃສ່ຊື່ຜູ້ໃຊ້ ແລະ ລະຫັດຜ່ານ';
        SOUNDS.playError();
        return;
      }
      if (AUTH.loginUser(u, p)) {
        // Play login sound, then redirect after it finishes (~500ms)
        SOUNDS.playLogin();
        setTimeout(() => { window.location.href = 'index.html'; }, 500);
      } else {
        err.style.display='block';
        err.textContent='❌ ຊື່ຜູ້ໃຊ້ ຫຼື ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ';
        document.getElementById('password').value = '';
        SOUNDS.playError();
      }
    }
    document.addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
  </script>
</body>
</html>
